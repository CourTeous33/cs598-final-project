version: '3.8'

services:
  # Frontend - NextJS application
  webui:
    build:
      context: ./webui
      dockerfile: Dockerfile
    container_name: webui
    restart: unless-stopped
    volumes:
      - ./webui:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - app-network

  # Backend - API service that manages worker interactions and serves as distributed-llama root node
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
      - BUILDKIT_PROGRESS=plain  # Shows more build details
    container_name: backend
    restart: unless-stopped
    volumes:
      - ./backend:/app
      - ./models:/models
    environment:
      - WORKER_URLS=http://192.168.90.11:5000,http://192.168.90.12:5000,http://192.168.90.13:5000,http://192.168.90.14:5000,http://192.168.90.15:5000
      - DLLAMA_MODEL_PATH=/models/llama3_2_1b_instruct_q40/dllama_model_llama3_2_1b_instruct_q40.m
      - DLLAMA_TOKENIZER_PATH=/models/llama3_2_1b_instruct_q40/dllama_tokenizer_llama3_2_1b_instruct_q40.t
    networks:
      - app-network
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
    # Healthcheck to ensure backend is running properly
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/workers/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Workers - Distributed LLM worker containers (1-5)
  worker1:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: worker1
    restart: unless-stopped
    ports:
      - "9991:9991"
      - "19998:9998"
    volumes:
      - ./worker:/app
      - ./models:/models
    environment:
      - WORKER_ID=1
      - DLLAMA_WORKER_PORT=9991
      - DLLAMA_API_PORT=5000
    networks:
      app-network:
        ipv4_address: 192.168.90.11
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
    # Healthcheck to ensure worker is running properly
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  worker2:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: worker2
    restart: unless-stopped
    ports:
      - "9992:9992"
      - "29998:9998"
    volumes:
      - ./worker:/app
      - ./models:/models
    environment:
      - WORKER_ID=2
      - DLLAMA_WORKER_PORT=9992
      - DLLAMA_API_PORT=5000
    networks:
      app-network:
        ipv4_address: 192.168.90.12
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  worker3:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: worker3
    restart: unless-stopped
    ports:
      - "9993:9993"
      - "39998:9998"
    volumes:
      - ./worker:/app
      - ./models:/models
    environment:
      - WORKER_ID=3
      - DLLAMA_WORKER_PORT=9993
      - DLLAMA_API_PORT=5000
    networks:
      app-network:
        ipv4_address: 192.168.90.13
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  worker4:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: worker4
    restart: unless-stopped
    ports:
      - "9994:9994"
      - "49998:9998"
    volumes:
      - ./worker:/app
      - ./models:/models
    environment:
      - WORKER_ID=4
      - DLLAMA_WORKER_PORT=9994
      - DLLAMA_API_PORT=5000
    networks:
      app-network:
        ipv4_address: 192.168.90.14
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  worker5:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: worker5
    restart: unless-stopped
    ports:
      - "9995:9995"
      - "59998:9998"
    volumes:
      - ./worker:/app
      - ./models:/models
    environment:
      - WORKER_ID=5
      - DLLAMA_WORKER_PORT=9995
      - DLLAMA_API_PORT=5000
    networks:
      app-network:
        ipv4_address: 192.168.90.15
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Model downloader service - one-time initialization service
  model-downloader:
    build:
      context: ./model-downloader
      dockerfile: Dockerfile
    container_name: model-downloader
    volumes:
      - ./models:/models
    # Remove the MODEL_NAME environment variable to force interactive mode
    stdin_open: true  # Keep STDIN open
    tty: true         # Allocate a pseudo-TTY
    networks:
      - app-network
    restart: "no"

  # Nginx - Reverse proxy
  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf:/etc/nginx/conf.d
      - ./nginx/certs:/etc/nginx/certs
      - ./nginx/logs:/var/log/nginx
    depends_on:
      - webui
      - backend
    networks:
      - app-network

  # Monitoring service using Prometheus
  prometheus:
    image: prom/prometheus
    container_name: prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    networks:
      - app-network
    restart: unless-stopped

  # Visualization with Grafana
  grafana:
    image: grafana/grafana
    container_name: grafana
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    depends_on:
      - prometheus
    networks:
      - app-network
    restart: unless-stopped

# Networks
networks:
  app-network:
    name: app-network
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 192.168.90.0/24
          gateway: 192.168.90.1

# Volumes for persistent model data and monitoring
volumes:
  models:
  prometheus_data:
  grafana_data: